<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600&amp;family=Inter:wght@500&amp;display=swap');
      .wordmark { font-family: 'Bricolage Grotesque', 'Poppins', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; }
      .tagline  { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 500; }
    </style>
    <radialGradient id="atm1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#141A3A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#080D26" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atm2" cx="25%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#C8A968" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#080D26" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="#080D26"/>
  <rect width="1920" height="1080" fill="url(#atm1)"/>
  <rect width="1920" height="1080" fill="url(#atm2)"/>

  <!-- Top rule with dot — centered at y=420 -->
  <line x1="870" y1="420" x2="945" y2="420" stroke="#C8A968" stroke-width="3"/>
  <circle cx="960" cy="420" r="6" fill="#C8A968"/>
  <line x1="975" y1="420" x2="1050" y2="420" stroke="#C8A968" stroke-width="3"/>

  <!-- Wordmark -->
  <text x="960" y="610" text-anchor="middle"
        class="wordmark"
        font-size="240" fill="#F0EBE0" letter-spacing="-12">SICE</text>

  <!-- Bottom rule -->
  <line x1="530" y1="660" x2="1390" y2="660" stroke="#C8A968" stroke-width="2"/>

  <!-- Tagline -->
  <text x="960" y="710" text-anchor="middle"
        class="tagline"
        font-size="24" fill="#C8A968" letter-spacing="11">SOUTH INDIAN CREATOR ECONOMY</text>
</svg>
